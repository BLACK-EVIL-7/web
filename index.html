<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>امتحانات الدفعة - كلية نظم ومعلومات</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

  <style>
    body { font-family: 'Segoe UI', system-ui, sans-serif; }
    .option-card { transition: all 0.3s; }
    .option-card:hover { transform: translateY(-2px); }
    .correct { border: 3px solid #22c55e !important; background: #052e16 !important; }
    .wrong { border: 3px solid #ef4444 !important; background: #450a0a !important; }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">
  <!-- Navbar -->
  <nav class="bg-zinc-900 border-b border-zinc-800 px-6 py-4 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <i class="fas fa-graduation-cap text-3xl text-emerald-500"></i>
      <h1 class="text-2xl font-bold">امتحانات الدفعة</h1>
    </div>
    <div class="flex items-center gap-4">
      <button onclick="showHome()" class="px-5 py-2 hover:bg-zinc-800 rounded-xl flex items-center gap-2">
        <i class="fas fa-home"></i> الرئيسية
      </button>
      <button onclick="showAdmin()" class="px-5 py-2 bg-emerald-600 hover:bg-emerald-500 rounded-xl flex items-center gap-2">
        <i class="fas fa-cog"></i> وضع الإدارة
      </button>
    </div>
  </nav>

  <div id="main" class="max-w-4xl mx-auto p-6">

    <!-- HOME PAGE -->
    <div id="home-page">
      <h2 class="text-4xl font-bold text-center mb-8">مرحباً يا ليدر الدفعة 👋</h2>
      <div id="quizzes-list" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
    </div>

    <!-- QUIZ PAGE -->
    <div id="quiz-page" class="hidden">
      <div class="flex justify-between items-center mb-6">
        <div class="text-lg font-medium" id="quiz-title"></div>
        <div class="flex items-center gap-3">
          <span id="progress" class="px-4 py-1 bg-zinc-800 rounded-full text-sm"></span>
          <button onclick="exitQuiz()" class="text-red-400 hover:text-red-500">
            <i class="fas fa-times"></i> خروج
          </button>
        </div>
      </div>

      <div id="question-card" class="bg-zinc-900 rounded-3xl p-8 shadow-2xl"></div>

      <div class="flex justify-between mt-8">
        <button onclick="skipQuestion()" class="px-8 py-3 text-zinc-400 hover:text-white">تخطي السؤال</button>
        <button onclick="submitAnswer()" id="submit-btn"
          class="px-10 py-3 bg-emerald-600 hover:bg-emerald-500 rounded-2xl font-semibold text-lg">
          تقديم الإجابة
        </button>
      </div>
    </div>

    <!-- RESULTS PAGE -->
    <div id="results-page" class="hidden">
      <div class="text-center mb-8">
        <h2 class="text-5xl font-bold text-emerald-400">أحسنت! اكتمل الاختبار.</h2>
      </div>
      <div class="grid grid-cols-3 gap-6 mb-8">
        <div class="bg-zinc-900 rounded-3xl p-6 text-center">
          <div id="correct-count" class="text-6xl font-bold text-emerald-400">6</div>
          <div class="text-zinc-400">إجابة صحيحة</div>
        </div>
        <div class="bg-zinc-900 rounded-3xl p-6 text-center">
          <div id="wrong-count" class="text-6xl font-bold text-red-400">4</div>
          <div class="text-zinc-400">إجابة خاطئة</div>
        </div>
        <div class="bg-zinc-900 rounded-3xl p-6 text-center">
          <div id="skipped-count" class="text-6xl font-bold text-amber-400">0</div>
          <div class="text-zinc-400">تم تخطيها</div>
        </div>
      </div>
      <div class="flex justify-center gap-12 text-center">
        <div>
          <div id="accuracy" class="text-7xl font-bold">60%</div>
          <div class="text-zinc-400 text-xl">الدقة</div>
        </div>
        <div>
          <div id="score" class="text-7xl font-bold text-emerald-400">6/10</div>
          <div class="text-zinc-400 text-xl">النتيجة</div>
        </div>
      </div>
      <div class="text-center mt-10">
        <button onclick="reviewAnswers()" 
          class="px-8 py-4 bg-zinc-800 hover:bg-zinc-700 rounded-2xl text-lg font-medium">
          مراجعة الإجابات
        </button>
        <button onclick="backToHome()" 
          class="px-8 py-4 ml-4 bg-emerald-600 hover:bg-emerald-500 rounded-2xl text-lg font-medium">
          العودة للرئيسية
        </button>
      </div>
    </div>

    <!-- ADMIN PAGE -->
    <div id="admin-page" class="hidden">
      <h2 class="text-3xl font-bold mb-6">وضع الإدارة</h2>
      <div class="flex gap-4 mb-6">
        <button onclick="addNewQuiz()" 
          class="flex-1 bg-emerald-600 hover:bg-emerald-500 py-4 rounded-3xl font-semibold text-xl">
          + إضافة امتحان جديد
        </button>
      </div>
      <div id="admin-quizzes-list" class="space-y-4"></div>
    </div>

  </div>

  <script>
    // ====================== Firebase Config ======================
    const firebaseConfig = {
      apiKey: "AIzaSyC2UGA5oBXXcE_9SiFVza5S_7jWe9uBRWQ",
      authDomain: "exams-28496.firebaseapp.com",
      projectId: "exams-28496",
      storageBucket: "exams-28496.firebasestorage.app",
      messagingSenderId: "547094102291",
      appId: "1:547094102291:web:6b545e2eabff4a7f1b5ae6",
      measurementId: "G-B517FJWKML"
    };

    const app = firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const quizzesRef = database.ref('quizzes');

    let quizzes = [];
    let currentQuiz = null;
    let currentQuestionIndex = 0;
    let userAnswers = {};
    let password = "leader123";

    // ====================== Improved Load & Save ======================
    function loadQuizzes() {
      quizzesRef.once('value', (snapshot) => {
        const data = snapshot.val();
        quizzes = data ? Object.values(data) : [{
          id: 1,
          title: "امتحان اقتصاد - سوق العمل",
          questions: [
            {
              id: 1,
              type: "mcq",
              question: "إذا كان ناتج المقارنة بين الطلب (المطلوب) والعرض (المتاح) من العمالة 'سالياً' (المتاح < المطلوب)، فإن المنظمة تعاني من:",
              options: ["توازن في سوق العمل", "خطأ في تحليل الوظائف", "عجز في العمالة", "فائض في العمالة"],
              correct: 3,
              explanation: "الفائض يعني وجود أفراد أكثر من حاجة العمل الفعلية، وهو ما يشار إليه بالناتج السالب في المقارنة."
            }
          ]
        }];
        renderQuizzes();
        renderAdminQuizzes();
      });
    }

    function saveQuizzes() {
      const quizzesObj = {};
      quizzes.forEach(q => {
        quizzesObj[q.id] = q;
      });
      quizzesRef.set(quizzesObj).then(() => {
        console.log("✅ تم الحفظ على Firebase بنجاح");
      }).catch((error) => {
        console.error("❌ خطأ في الحفظ:", error);
      });
    }

    // ====================== RENDER FUNCTIONS ======================
    function renderQuizzes() {
      const container = document.getElementById('quizzes-list');
      container.innerHTML = quizzes.map(q => `
        <div onclick="startQuiz(${q.id})" class="bg-zinc-900 hover:bg-zinc-800 rounded-3xl p-8 cursor-pointer transition-all">
          <h3 class="text-2xl font-semibold">${q.title}</h3>
          <p class="text-zinc-400 mt-2">${q.questions ? q.questions.length : 0} سؤال</p>
        </div>
      `).join('');
    }

    function renderAdminQuizzes() {
      const container = document.getElementById('admin-quizzes-list');
      container.innerHTML = quizzes.map((q, i) => `
        <div class="bg-zinc-900 rounded-3xl p-6 flex justify-between items-center">
          <div>
            <h4 class="text-xl">${q.title}</h4>
            <p class="text-zinc-400">${q.questions ? q.questions.length : 0} سؤال</p>
          </div>
          <div class="flex gap-3">
            <button onclick="editQuiz(${q.id}); event.stopImmediatePropagation();" 
              class="px-6 py-3 bg-blue-600 hover:bg-blue-500 rounded-2xl">تعديل</button>
            <button onclick="deleteQuiz(${i}); event.stopImmediatePropagation();" 
              class="px-6 py-3 bg-red-600 hover:bg-red-500 rounded-2xl">حذف</button>
          </div>
        </div>
      `).join('');
    }

    // ====================== ADMIN FUNCTIONS (مُعدلة قليلاً للإصلاح) ======================
    function addNewQuiz() {
      const title = prompt("اسم الامتحان / المنهج:");
      if (!title) return;

      const newQuiz = {
        id: Date.now(),
        title: title,
        questions: []
      };

      quizzes.push(newQuiz);
      saveQuizzes();           // حفظ فوري
      renderAdminQuizzes();    // تحديث فوري لصفحة الإدارة
      editQuiz(newQuiz.id);    // فتح صفحة تعديل السؤال مباشرة
    }

    function deleteQuiz(index) {
      if (confirm("حذف الامتحان؟")) {
        quizzes.splice(index, 1);
        saveQuizzes();
        renderAdminQuizzes();
      }
    }

    // باقي الدوال (editQuiz, addQuestionToQuiz, deleteQuestion, showAdmin, etc.) تبقى كما هي بدون تغيير

    function showAdmin() {
      const pass = prompt("🔑 كلمة السر للوصول للوحة الإدارة:");
      if (pass !== password) return alert("كلمة سر خاطئة!");
      document.getElementById('home-page').classList.add('hidden');
      document.getElementById('quiz-page').classList.add('hidden');
      document.getElementById('results-page').classList.add('hidden');
      document.getElementById('admin-page').classList.remove('hidden');
      renderAdminQuizzes();
    }

    function editQuiz(id) {
      const quiz = quizzes.find(q => q.id === id);
      let html = `<h3 class="text-2xl mb-4">${quiz.title}</h3>`;
      html += `<button onclick="addQuestionToQuiz(${id})" class="bg-emerald-600 hover:bg-emerald-500 px-6 py-3 rounded-2xl mb-6">+ إضافة سؤال جديد</button>`;
      html += `<div class="space-y-4">`;
      (quiz.questions || []).forEach((q, i) => {
        html += `<div class="bg-zinc-800 p-6 rounded-3xl flex justify-between">
          <div>${q.question.substring(0, 60)}...</div>
          <button onclick="deleteQuestion(${id}, ${i});" class="text-red-400">حذف</button>
        </div>`;
      });
      html += `</div><button onclick="saveQuizzes(); renderAdminQuizzes();" class="mt-6 text-zinc-400">رجوع</button>`;
      document.getElementById('admin-quizzes-list').innerHTML = html;
    }

    function addQuestionToQuiz(quizId) {
      const quiz = quizzes.find(q => q.id === quizId);
      const type = prompt("نوع السؤال:\n1 = اختياري\n2 = صح/خطأ\n3 = مقالي");
      
      let q = { id: Date.now(), explanation: "" };
      
      if (type === "1") {
        q.type = "mcq";
        q.question = prompt("نص السؤال:");
        q.options = [];
        for (let i = 0; i < 4; i++) q.options.push(prompt(`الخيار ${String.fromCharCode(65+i)}:`));
        q.correct = parseInt(prompt("رقم الإجابة الصحيحة (0-3):"));
      } else if (type === "2") {
        q.type = "tf";
        q.question = prompt("نص السؤال:");
        q.options = ["صح", "خطأ"];
        q.correct = prompt("الإجابة الصحيحة (صح أو خطأ):") === "صح" ? 0 : 1;
      } else if (type === "3") {
        q.type = "essay";
        q.question = prompt("نص السؤال:");
        const keywords = prompt("كلمات مفتاحية تفصل بفاصلة (عشان الحكم التلقائي):");
        q.keywords = keywords.split(',').map(k => k.trim());
      }
      
      q.explanation = prompt("شرح الإجابة (اختياري):") || "";
      quiz.questions = quiz.questions || [];
      quiz.questions.push(q);
      saveQuizzes();
      editQuiz(quizId);
    }

    function deleteQuestion(quizId, index) {
      const quiz = quizzes.find(q => q.id === quizId);
      if (quiz && quiz.questions) {
        quiz.questions.splice(index, 1);
        saveQuizzes();
        editQuiz(quizId);
      }
    }

    // ====================== باقي الكود الأصلي (بدون تغيير) ======================
    function startQuiz(id) {
      currentQuiz = quizzes.find(q => q.id === id);
      currentQuestionIndex = 0;
      userAnswers = {};
      document.getElementById('home-page').classList.add('hidden');
      document.getElementById('quiz-page').classList.remove('hidden');
      document.getElementById('quiz-title').textContent = currentQuiz.title;
      showCurrentQuestion();
    }

    function showCurrentQuestion() {
      const q = currentQuiz.questions[currentQuestionIndex];
      const container = document.getElementById('question-card');
      
      let html = `<div class="mb-8">
        <span class="text-emerald-400 font-medium">السؤال ${currentQuestionIndex + 1} / ${currentQuiz.questions.length}</span>
        <h3 class="text-2xl mt-3 leading-relaxed">${q.question}</h3>
      </div>`;

      if (q.type === "mcq") {
        html += `<div class="grid grid-cols-1 gap-4">`;
        q.options.forEach((opt, i) => {
          html += `
            <div onclick="selectOption(${i})" id="opt-${i}" 
              class="option-card bg-zinc-800 hover:bg-zinc-700 p-6 rounded-3xl text-xl cursor-pointer flex items-center gap-4">
              <span class="font-mono text-emerald-400">${String.fromCharCode(65 + i)}</span>
              <span>${opt}</span>
            </div>`;
        });
        html += `</div>`;
      } else if (q.type === "tf") {
        html += `
          <div class="grid grid-cols-2 gap-6">
            <div onclick="selectOption(0)" id="opt-0" class="option-card bg-zinc-800 hover:bg-zinc-700 p-8 rounded-3xl text-center text-2xl cursor-pointer">صح</div>
            <div onclick="selectOption(1)" id="opt-1" class="option-card bg-zinc-800 hover:bg-zinc-700 p-8 rounded-3xl text-center text-2xl cursor-pointer">خطأ</div>
          </div>`;
      } else if (q.type === "essay") {
        html += `
          <textarea id="essay-input" rows="6"
            class="w-full bg-zinc-800 rounded-3xl p-6 text-xl resize-none focus:outline-none focus:ring-2 focus:ring-emerald-500"
            placeholder="اكتب إجابتك هنا..."></textarea>`;
      }

      container.innerHTML = html;
      document.getElementById('submit-btn').textContent = currentQuestionIndex === currentQuiz.questions.length - 1 ? "إنهاء الامتحان" : "تقديم الإجابة";
    }

    let selectedIndex = null;
    function selectOption(i) {
      selectedIndex = i;
      document.querySelectorAll('.option-card').forEach(el => el.classList.remove('ring-4', 'ring-emerald-400'));
      document.getElementById(`opt-${i}`).classList.add('ring-4', 'ring-emerald-400');
    }

    function submitAnswer() {
      const q = currentQuiz.questions[currentQuestionIndex];
      
      if (q.type === "mcq" || q.type === "tf") {
        if (selectedIndex === null) return alert("اختر إجابة أولاً!");
        userAnswers[q.id] = selectedIndex;
      } else if (q.type === "essay") {
        const answer = document.getElementById('essay-input').value.trim();
        if (!answer) return alert("اكتب إجابة!");
        userAnswers[q.id] = answer;
      }

      showFeedback();
    }

    function showFeedback() {
      const q = currentQuiz.questions[currentQuestionIndex];
      const container = document.getElementById('question-card');
      let html = `<div class="mb-8"><h3 class="text-2xl">${q.question}</h3></div>`;

      if (q.type === "mcq" || q.type === "tf") {
        const userChoice = userAnswers[q.id];
        html += `<div class="grid grid-cols-1 gap-4">`;
        (q.options || ["صح", "خطأ"]).forEach((opt, i) => {
          let cls = '';
          if (i === q.correct) cls = 'correct';
          else if (i === userChoice) cls = 'wrong';
          html += `
            <div class="option-card ${cls} p-6 rounded-3xl text-xl flex items-center gap-4">
              <span class="font-mono">${String.fromCharCode(65 + i)}</span>
              <span>${opt}</span>
              ${i === q.correct ? '<i class="fas fa-check ml-auto text-2xl text-emerald-400"></i>' : ''}
              ${i === userChoice && i !== q.correct ? '<i class="fas fa-times ml-auto text-2xl text-red-400"></i>' : ''}
            </div>`;
        });
        html += `</div>`;
      } else if (q.type === "essay") {
        const answer = userAnswers[q.id];
        const isCorrect = q.keywords.some(kw => answer.toLowerCase().includes(kw.toLowerCase()));
        html += `
          <div class="bg-zinc-800 p-8 rounded-3xl">
            <p class="text-xl mb-4">إجابتك:</p>
            <p class="text-lg">${answer}</p>
            <div class="mt-8 ${isCorrect ? 'text-emerald-400' : 'text-red-400'} font-medium text-2xl flex items-center gap-3">
              ${isCorrect ? '<i class="fas fa-check-circle"></i> إجابة صحيحة' : '<i class="fas fa-times-circle"></i> إجابة خاطئة'}
            </div>
          </div>`;
      }

      if (q.explanation) {
        html += `<div class="mt-8 bg-emerald-950 border border-emerald-900 rounded-3xl p-6 text-emerald-200">${q.explanation}</div>`;
      }

      html += `<div class="text-center mt-10">
        <button onclick="nextQuestion()" class="px-12 py-4 bg-emerald-600 hover:bg-emerald-500 rounded-3xl text-xl font-semibold">السؤال التالي</button>
      </div>`;

      container.innerHTML = html;
    }

    function nextQuestion() {
      currentQuestionIndex++;
      if (currentQuestionIndex >= currentQuiz.questions.length) {
        showResults();
      } else {
        selectedIndex = null;
        showCurrentQuestion();
      }
    }

    function skipQuestion() {
      userAnswers[currentQuiz.questions[currentQuestionIndex].id] = null;
      nextQuestion();
    }

    function showResults() {
      document.getElementById('quiz-page').classList.add('hidden');
      document.getElementById('results-page').classList.remove('hidden');

      let correct = 0, wrong = 0, skipped = 0;
      currentQuiz.questions.forEach(q => {
        const ans = userAnswers[q.id];
        if (ans === null) skipped++;
        else if (q.type === "essay") {
          if (q.keywords.some(kw => ans.toLowerCase().includes(kw.toLowerCase()))) correct++;
          else wrong++;
        } else if (ans === q.correct) correct++;
        else wrong++;
      });

      const total = currentQuiz.questions.length;
      const percentage = Math.round((correct / total) * 100);

      document.getElementById('correct-count').textContent = correct;
      document.getElementById('wrong-count').textContent = wrong;
      document.getElementById('skipped-count').textContent = skipped;
      document.getElementById('accuracy').innerHTML = `${percentage}<span class="text-3xl">%</span>`;
      document.getElementById('score').textContent = `${correct}/${total}`;
    }

    function reviewAnswers() {
      alert("مراجعة الإجابات كاملة (ممكن تطويرها في الإصدار الجاي إن شاء الله)");
      backToHome();
    }

    function exitQuiz() {
      if (confirm("هل تريد الخروج من الامتحان؟")) {
        document.getElementById('quiz-page').classList.add('hidden');
        document.getElementById('home-page').classList.remove('hidden');
      }
    }

    function backToHome() {
      document.getElementById('results-page').classList.add('hidden');
      document.getElementById('home-page').classList.remove('hidden');
      currentQuiz = null;
    }

    // ====================== START ======================
    function showHome() {
      document.querySelectorAll('#main > div').forEach(div => div.classList.add('hidden'));
      document.getElementById('home-page').classList.remove('hidden');
      renderQuizzes();
    }

    initTailwind();
    loadQuizzes();
    console.log('%c✅ الويب سايت متصل بـ Firebase!', 'color:#22c55e; font-size:18px;');
  </script>
</body>
</html>
